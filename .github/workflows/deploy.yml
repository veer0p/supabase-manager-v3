name: Deploy to VPS

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy to VPS
        env:
          VPS_HOST: "144.91.101.255"
          VPS_USER: "root"
          VPS_PASS: ${{ secrets.VPS_PASSWORD }}
          DATABASE_URL: "postgresql://postgres:vcp2CWFk91DO@localhost:5435/postgres"
        run: |
          node deploy_to_vps.js
