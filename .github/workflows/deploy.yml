name: Deploy to VPS

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Root Dependencies
        run: npm install

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_IP }}
          VPS_USER: "root"
          VPS_PASS: ${{ secrets.VPS_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node deploy_to_vps.js
